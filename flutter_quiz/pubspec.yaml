name: flutter_quiz
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/mokup/
    - assets/imagens/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "web/favicon.png"
  remove_alpha_ios: true